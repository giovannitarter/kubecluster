---
cluster:

  inlineManifests:

    - name: flux-namespace
      contents: |
        apiVersion: v1
        kind: Namespace
        metadata:
          name: flux-system
        spec: {}
        status: {}

    - name: 0200-flux-instance
      contents: |
        apiVersion: fluxcd.controlplane.io/v1
        kind: FluxInstance
        metadata:
          name: flux
          namespace: flux-system
          annotations:
            fluxcd.controlplane.io/reconcileEvery: "1h"
            fluxcd.controlplane.io/reconcileTimeout: "10m"
        spec:
          distribution:
            version: "2.x"
            registry: "ghcr.io/fluxcd"
            artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests"
          components:
            - source-controller
            - source-watcher
            - kustomize-controller
            - helm-controller
            - notification-controller
            - image-reflector-controller
            - image-automation-controller
          cluster:
            type: kubernetes
            size: medium
            multitenant: false
            networkPolicy: true
            domain: "cluster.local"
          kustomize:
            patches:
              - target:
                  kind: Deployment
                patch: |
                  - op: replace
                    path: /spec/template/spec/nodeSelector
                    value:
                      kubernetes.io/os: linux
                  - op: add
                    path: /spec/template/spec/tolerations
                    value:
                      - key: "CriticalAddonsOnly"
                        operator: "Exists"
          sync:
            kind: GitRepository
            url: "ssh://git@github.com/giovannitarter/kubecluster.git"
            ref: "refs/heads/main"
            path: "clusters/talos-prod"
            pullSecret: "flux-system"
